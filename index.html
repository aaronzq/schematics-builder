<!DOCTYPE html>
<html lang="en">
<head>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-9Z6BM63XPV"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-9Z6BM63XPV');
  </script>

  <meta charset="UTF-8">
  <title>Optical Schematic Builder</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="main-layout">
    <div class="menubar-container">
      <div class="app-header-left">
        <div class="app-icon">
          <span class="material-symbols-outlined" style="font-size: 40px; color: #3a3a3a;">graph_7</span>
        </div>
        <div class="menu-content-wrapper">
          <div class="filename-container">
             <input type="text" class="filename-text" value="Untitled Schematic" placeholder="Untitled Schematic">
          </div>
          <nav class="menubar-nav">
            <div class="menu-group">
              <span class="menu-label">File</span>
              <div class="menu-dropdown">
                <button id="import-schematic-btn" class="menu-btn">Import JSON</button>
                <button id="export-schematic-btn" class="menu-btn">Export JSON</button>
                <div class="menu-separator"></div>
                <button id="export-svg-btn" class="menu-btn">Export SVG</button>
              </div>
            </div>
            <div class="menu-group">
              <span class="menu-label">Canvas</span>
              <div class="menu-dropdown">
                <button id="reset-canvas-btn" class="menu-btn">Reset Canvas</button>
                <div class="menu-separator"></div>
                <button id="toggle-grid-btn" class="menu-btn">Toggle Grid</button>
                <button id="trace-btn" class="menu-btn">Toggle Trace</button>
                <button id="rays-toggle-btn" class="menu-btn">Toggle Rays</button>
              </div>
            </div>
            <div class="menu-group">
              <span class="menu-label" onclick="saveCanvasAndNavigate('gallery/index.html');">Gallery</span>
            </div>
            <div class="menu-group">
              <span class="menu-label" onclick="saveCanvasAndNavigate('tutorial/index.html');">Help</span>
            </div>
          </nav>
        </div>
      </div>
    </div>
    
    <div class="content-row">
      <aside class="sidebar">
        <div class="sidebar-header">
          <h2>Component Library</h2>
          <p class="sidebar-subtitle">Click to place component</p>
        </div>
        <div class="component-menu">
          <div class="category-header" data-category="lens">
            <p class="category-title">Lens</p>
            <span class="material-symbols-outlined category-icon">expand_more</span>
          </div>
          <div class="category-content" data-category-content="lens">
            <button data-component="objective">Objective</button>
            <button data-component="lens">Convex Lens</button>
            <!-- <button data-component="lens-transparent">Convex Lens 2</button>
            <button data-component="lens2">Concave Lens</button>
            <button data-component="lens3">Aspheric Lens</button> -->
          </div>
        </div>

        <div class="component-menu">
          <div class="category-header" data-category="mirrors">
            <p class="category-title">Mirrors</p>
            <span class="material-symbols-outlined category-icon">expand_more</span>
          </div>
          <div class="category-content" data-category-content="mirrors">
            <!-- <button data-component="mirror">Flat Mirror</button>
            <button data-component="mirror2">Concave Mirror</button>
            <button data-component="mirror3">Convex Mirror</button> -->
          </div>
        </div>

        <div class="component-menu">
          <div class="category-header" data-category="optoelectronics">
            <p class="category-title">Optoelectronics</p>
            <span class="material-symbols-outlined category-icon">expand_more</span>
          </div>
          <div class="category-content" data-category-content="optoelectronics">
            <!-- <button data-component="dmd">DMD</button>
            <button data-component="slm">SLM</button>
            <button data-component="polygon-scanner">Polygon Scanner</button>
            <button data-component="voice-coil-mirror">Voice Coil Mirror</button>
            <button data-component="voice-coil-mirror2">Voice Coil Mirror2</button> -->
          </div>
        </div>

        <div class="component-menu">
          <div class="category-header" data-category="detectors">
            <p class="category-title">Detectors</p>
            <span class="material-symbols-outlined category-icon">expand_more</span>
          </div>
          <div class="category-content" data-category-content="detectors">
            <!-- <button data-component="detector">Detector</button>
            <button data-component="photo-diode">PD</button> -->
          </div>
        </div>
      </aside>
      <div class="right-column">
        <div class="secondary-toolbar">
           <button id="delete-btn" class="tool-btn" title="Delete"><span class="material-symbols-outlined">delete</span></button>
           <div class="tool-separator"></div>
           <button id="flip-horizontal-btn" class="tool-btn" title="Flip Horizontal"><span class="material-symbols-outlined">flip</span></button>
           <button id="flip-vertical-btn" class="tool-btn" title="Flip Vertical"><span class="material-symbols-outlined" style="transform: rotate(90deg);">flip</span></button>            
           <div class="tool-separator"></div>
           <button id="hide-component-btn" class="tool-btn" title="Hide Selection"><span class="material-symbols-outlined">visibility_off</span></button>
           <button id="show-component-btn" class="tool-btn" title="Show Selection"><span class="material-symbols-outlined">visibility</span></button>
           <button id="show-all-components-btn" class="tool-btn" title="Show All"><span class="material-symbols-outlined">visibility</span> <sub>ALL</sub></button> 
           <div class="tool-separator"></div>
           <button id="group-btn" class="tool-btn" title="Group"><span class="material-symbols-outlined">group</span></button>
           <button id="ungroup-btn" class="tool-btn" title="Ungroup"><span class="material-symbols-outlined">ungroup</span></button>
        </div>
        <main class="workspace-area">
          <div class="canvas-container">
            <!-- <canvas id="grid-canvas" style="position:absolute; left:0; top:0; z-index:0;"></canvas> -->
            <svg id="canvas" style="position:relative; z-index:1;">
              <defs>
                <!-- Component definitions will go here -->
              </defs>
              <!-- <circle cx="0" cy="0" r="5" fill="red"/> -->
              <g id="grid"></g>
              <g id="schematics"></g>
            </svg>
          </div>
        </main>
      </div>
    </div>
    <footer class="footer">
      <div class="footer-content">
        <p style="margin-bottom: 4px; font-weight: bold; color: #fff;">Optical Schematic Builder</p>
        <p>
          Developed by &nbsp; 
          <a href="https://github.com/aaronzq/schematics-builder" target="_blank" rel="noopener">
            <img style="filter: invert(100%)" src="img/github-mark.svg" alt="GitHub">
            aaronzq
          </a>
        </p>
      </div>
    </footer>
  </div>

  <script type="module" src="scripts/App.js"></script>
</body>
</html>
