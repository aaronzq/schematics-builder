<!DOCTYPE html>
<html lang="en">
<head>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-9Z6BM63XPV"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-9Z6BM63XPV');
  </script>

  <meta charset="UTF-8">
  <title>Optical Schematic Builder</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="main-layout">
    <div class="menubar-container">
      <div class="app-header-left">
        <div class="app-icon">
          <span class="material-symbols-outlined" style="font-size: 40px; color: #3a3a3a;">graph_7</span>
        </div>
        <div class="menu-content-wrapper">
          <div class="filename-container">
             <input type="text" class="filename-text" value="Untitled Schematic" placeholder="Untitled Schematic">
          </div>
          <nav class="menubar-nav">
            <div class="menu-group">
              <span class="menu-label">File</span>
              <div class="menu-dropdown">
                <button id="import-schematic-btn" class="menu-btn">Import JSON</button>
                <button id="export-schematic-btn" class="menu-btn">Export JSON</button>
                <div class="menu-separator"></div>
                <button id="import-user-components-btn" class="menu-btn">Import User Components</button>
                <button id="export-user-components-btn" class="menu-btn">Export User Components</button>
                <div class="menu-separator"></div>
                <button id="export-svg-btn" class="menu-btn">Export SVG</button>
              </div>
            </div>
            <div class="menu-group">
              <span class="menu-label">Edit</span>
              <div class="menu-dropdown">
                <button id="reset-canvas-btn" class="menu-btn">Reset Canvas</button>
                <div class="menu-separator"></div>
                <button id="toggle-grid-btn" class="menu-btn">Grid On</button>
                <button id="trace-btn" class="menu-btn">Trace On</button>
                <button id="rays-toggle-btn" class="menu-btn">Only Ray</button>
              </div>
            </div>
            <div class="menu-group">
              <span class="menu-label" onclick="saveCanvasAndNavigate('gallery/index.html');">Gallery</span>
            </div>
            <div class="menu-group">
              <span class="menu-label" onclick="saveCanvasAndNavigate('tutorial/index.html');">Help</span>
            </div>
          </nav>
        </div>
      </div>
    </div>
    
    <div class="content-row">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-inner">
          <div class="sidebar-header">
            <h2>Component Library</h2>
            <p class="sidebar-subtitle">Click to place component</p>
          </div>
          <div id="component-menu-root"></div>
        </div>
        <div class="sidebar-resize-handle" id="sidebar-resize-handle"></div>
      </aside>
      <div class="right-column">
        <div class="secondary-toolbar">
           <button id="undo-btn" class="tool-btn" title="Undo"><span class="material-symbols-outlined">undo</span></button>
           <button id="redo-btn" class="tool-btn" title="Redo"><span class="material-symbols-outlined">redo</span></button>
           <div class="tool-separator"></div>
           <button id="delete-btn" class="tool-btn" title="Delete"><span class="material-symbols-outlined">delete</span></button>
           <button id="hide-component-btn" class="tool-btn" title="Hide Selection"><span class="material-symbols-outlined">visibility_off</span></button>
           <button id="show-component-btn" class="tool-btn" title="Show Selection"><span class="material-symbols-outlined">visibility</span></button>
           <button id="show-all-components-btn" class="tool-btn" title="Show All"><span class="material-symbols-outlined">visibility</span> <sub>ALL</sub></button> 
           <button id="flip-horizontal-btn" class="tool-btn" title="Flip Horizontal"><span class="material-symbols-outlined">flip</span></button>
           <button id="flip-vertical-btn" class="tool-btn" title="Flip Vertical"><span class="material-symbols-outlined" style="transform: rotate(90deg);">flip</span></button>            
           <button id="group-btn" class="tool-btn" title="Group"><span class="material-symbols-outlined">group</span></button>
           <button id="ungroup-btn" class="tool-btn" title="Ungroup"><span class="material-symbols-outlined">group_off</span></button>
           <button id="cut-link-btn" class="tool-btn" title="Remove current link"><span class="material-symbols-outlined">link_off</span></button>
           <button id="re-link-btn" class="tool-btn" title="Re-link to a component"><span class="material-symbols-outlined">add_link</span></button>
           <div class="tool-separator" id="save-composite-separator" style="display:none"></div>
           <button id="save-as-composite-btn" class="tool-btn" title="Save component" style="display:none"><span class="material-symbols-outlined"><span class="material-symbols-outlined">
bookmark_star
</span></span></button>
           
        </div>
        <main class="workspace-area">
          <div class="canvas-container">
            <!-- <canvas id="grid-canvas" style="position:absolute; left:0; top:0; z-index:0;"></canvas> -->
            <svg id="canvas" style="position:relative; z-index:1;">
              <defs>
                <!-- Component definitions will go here -->
              </defs>
              <!-- <circle cx="0" cy="0" r="5" fill="red"/> -->
              <g id="grid" pointer-events="none"></g>
              <g id="schematics"></g>
              <g id="debug-overlay"></g>
            </svg>
          </div>
        </main>
      </div>

      <!-- Ray Configuration Panel (right column) -->
      <aside class="ray-panel" id="ray-panel">
        <div class="ray-panel-inner">
          <div class="ray-panel-header">
            <h2>Ray Configuration</h2>
          </div>
          <div id="ray-panel-body">
            <!-- Populated by RayMenu.js when a component is selected -->
          </div>
        </div>
      </aside>
    </div>
    <footer class="footer">
      <div class="footer-content">
        <p style="margin-bottom: 4px; font-weight: bold; color: #fff;">Optical Schematic Builder</p>
        <p>
          Developed by &nbsp; 
          <a href="https://github.com/aaronzq/schematics-builder" target="_blank" rel="noopener">
            <img style="filter: invert(100%)" src="img/github-mark.svg" alt="GitHub">
            aaronzq
          </a>
        </p>
      </div>
    </footer>
  </div>

  <dialog id="save-composite-dialog">
    <!-- SaveCompositeDialog.js manages this dialog's content dynamically -->
  </dialog>

  <!-- ray-menu-dialog removed: ray config is now in the right panel (#ray-panel) -->

  <script type="module" src="scripts/App.js"></script>
</body>
</html>
